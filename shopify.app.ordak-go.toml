# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ab729e4046f8cdea55d24bfffd815e6a"
name = "Ordak Go"
handle = "ordak-go"
application_url = "https://dev.ordak.vip/"
embedded = true

[access_scopes]
scopes = "write_products,write_orders,read_locations,write_merchant_managed_fulfillment_orders,write_delivery_customizations"

[auth]
redirect_urls = [ "https://dev.ordak.vip/api/auth" ]

[webhooks]
# Pinned to the current quarter (April 2026). Bumped quarterly via the
# scheduled stack-rot defense agent (memory/stack_rot_defense.md).
api_version = "2026-04"

[pos]
embedded = false

[app_proxy]
# Storefront calls https://{shop}.myshopify.com/apps/ordak-go/* → forwarded to
# <app-host>/apps/proxy/* and handled by Remix routes app/routes/apps.proxy.*.
# Pinned to https://dev.ordak.vip — the named cloudflared tunnel
# (ordak-go-dev) routed via Cloudflare DNS to localhost:5173 in dev. Production
# deploy will repoint this to the hosted app URL.
url = "https://dev.ordak.vip/apps/proxy"
subpath = "ordak-go"
prefix = "apps"

[build]
# automatically_update_urls_on_dev only fires under `shopify app dev`, which
# this project doesn't use. We run a stable named tunnel; URLs above are pinned.
automatically_update_urls_on_dev = false
dev_store_url = "ordak-go-dev.myshopify.com"
