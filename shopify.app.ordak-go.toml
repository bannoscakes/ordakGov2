# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ab729e4046f8cdea55d24bfffd815e6a"
name = "Ordak Go"
handle = "ordak-go"
application_url = "https://example.com/"
embedded = true

[access_scopes]
scopes = "write_products,write_orders,read_locations,write_merchant_managed_fulfillment_orders"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[webhooks]
# Pinned to the current quarter (April 2026). Bumped quarterly via the
# scheduled stack-rot defense agent (memory/stack_rot_defense.md).
api_version = "2026-04"

[pos]
embedded = false

[app_proxy]
# Storefront calls https://{shop}.myshopify.com/apps/ordak-go/* → forwarded to
# <app-host>/apps/proxy/* and handled by Remix routes app/routes/apps.proxy.*.
# `url` is rewritten to the live tunnel host on `shopify app dev` because
# `automatically_update_urls_on_dev = true` is set under [build].
url = "https://example.com/apps/proxy"
subpath = "ordak-go"
prefix = "apps"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "ordak-go-dev.myshopify.com"
