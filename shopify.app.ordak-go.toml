# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ab729e4046f8cdea55d24bfffd815e6a"
name = "Ordak Go"
handle = "ordak-go"
# Pinned to the stable named Cloudflare tunnel `ordak-go-dev` → localhost:5173.
# `npm run dev` runs cloudflared + Vite + `shopify app dev` together, so the
# embedded admin loads from local Vite (hot-reload) AND extensions hot-reload
# via `shopify app dev`'s Development previews. ONE iteration loop, no version
# releases needed for changes to be visible on `ordakgo-v3`.
#
# For App Store production: flip these URLs to `https://ordak-go.vercel.app`
# and run `shopify app deploy --release`. That's a one-time pre-launch action,
# not part of the iteration loop.
application_url = "https://dev.ordak.vip/"
embedded = true

[access_scopes]
# Least-privilege scopes. Each one is justified by an actual GraphQL
# query/mutation in the codebase — verified during Plan Task 5.8b.
#  - write_orders: webhooks/orders/create handler tags orders, writes
#    metafields, and the admin-side reschedule UI updates orders.
#  - read_locations: queries shop locations to pre-populate Location admin.
#  - write_delivery_customizations: registers the C.5 delivery-rate-filter
#    Function as an active DeliveryCustomization (admin GraphQL).
#  - write_shipping: registers the Carrier Service via carrierServiceCreate
#    and updates the AU shipping zone in /app/setup-au-shipping.
#  - write_validations: registers the cart-validation Function (D5).
#
# Previously included write_products and write_merchant_managed_fulfillment_orders;
# both dropped after audit found zero API usage. App Store reviewers
# flag overly-broad scopes; dropping them signals least-privilege.
scopes = "write_orders,read_locations,write_delivery_customizations,write_shipping,write_validations"

[auth]
redirect_urls = [ "https://dev.ordak.vip/api/auth" ]

[webhooks]
# Pinned to the current quarter (April 2026). Bumped quarterly via the
# scheduled stack-rot defense agent (memory/stack_rot_defense.md).
api_version = "2026-04"

[pos]
embedded = false

[app_proxy]
# Storefront calls https://{shop}.myshopify.com/apps/ordak-go/* → forwarded to
# <app-host>/apps/proxy/* and handled by Remix routes app/routes/apps.proxy.*.
# Routed via the named tunnel to local Vite. Same flip-for-prod rule as
# application_url applies.
url = "https://dev.ordak.vip/apps/proxy"
subpath = "ordak-go"
prefix = "apps"

[build]
# We use a stable named tunnel; URLs above stay pinned to dev.ordak.vip and
# the CLI does not auto-rewrite them on `shopify app dev`. The `dev-up.sh`
# script handles the one-time `shopify app deploy` to push these to Partners.
automatically_update_urls_on_dev = false
dev_store_url = "ordakgo-v3.myshopify.com"
